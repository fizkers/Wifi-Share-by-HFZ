<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi Share Pro - Founder Muhammad Hafiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        
        /* UI CARD */
        .card { background: var(--card); border-radius: 35px; padding: 45px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(255,255,255,0.8); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .founder { font-size: 0.65rem; font-weight: 800; color: #b2bec3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }
        h1 { font-size: 2rem; margin: 0; background: linear-gradient(45deg, var(--p), #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        /* BUTTONS & INPUTS */
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 18px; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { border-color: var(--p); background: white; outline: none; box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1); }
        
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; font-family: inherit; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 8px 25px rgba(108, 92, 231, 0.25); }
        .btn-google { background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 12px; color: #444; }
        .btn-print { background: #00b894; color: white; margin-top: 30px; }
        .btn:active { transform: scale(0.98); }

        /* TOAST NOTIFICATION */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 16px 35px; border-radius: 50px; font-size: 0.9rem; z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        #toast.show { bottom: 40px; }

        .hidden { display: none; }

        /* PRINT STYLES (FULL KERTAS) */
        #print-area { display: none; background: white; }
        
        @media print {
            @page { margin: 0; size: auto; }
            body { margin: 0; padding: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: fixed; left: 0; top: 0; width: 100vw; height: 100vh; 
                display: flex !important; flex-direction: column; justify-content: center; align-items: center; 
            }
            .print-card { 
                border: 12px solid #6c5ce7; border-radius: 80px; padding: 100px 50px; 
                width: 75%; max-width: 700px; text-align: center;
            }
            #print-area h1 { font-size: 5rem !important; -webkit-text-fill-color: #6c5ce7 !important; margin-bottom: 10px; }
            #print-area p { font-size: 1.8rem !important; color: #b2bec3 !important; }
            #print-area h2 { font-size: 4rem !important; margin-top: 40px; color: #2d3436 !important; }
            #qrcode-canvas img { width: 450px !important; height: 450px !important; margin: 50px auto; }
        }
    </style>
</head>
<body>

<div id="toast"><span id="toast-msg">Success</span></div>

<div class="container">
    <div id="auth-zone" class="card">
        <div class="founder">PLATFORM BY MUHAMMAD HAFIZ</div>
        <h1>WiFi Share 🔑</h1>
        <p style="color:#636e72; font-size: 0.85rem; margin-bottom: 40px;">Satu QR untuk selamanya, ganti sandi kapan saja.</p>
        <button class="btn btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Masuk dengan Google
        </button>
    </div>

    <div id="dash-zone" class="card hidden">
        <div class="founder">OWNER DASHBOARD</div>
        <h3 id="user-greeting" style="margin-bottom: 30px;">Halo, Bos! 👋</h3>
        <input type="text" id="dash-ssid" placeholder="Nama WiFi (SSID)">
        <input type="text" id="dash-pass" placeholder="Sandi WiFi Baru">
        <button class="btn btn-p" id="saveBtn">Simpan & Update Sistem</button>
        <button class="btn btn-print" id="printBtn">Cetak Kartu QR Full 🖨️</button>
        <p id="logoutBtn" style="color:#ff7675; cursor:pointer; font-size:0.8rem; margin-top:35px; font-weight: 600;">Keluar Akun</p>
    </div>

    <div id="scan-zone" class="card hidden">
        <div class="founder">WIFI PORTAL</div>
        <h1 id="out-ssid">...</h1>
        <div style="background:#f1f2f6; padding:40px 20px; border-radius:30px; margin:30px 0; border: 2px dashed #dfe6e9;">
            <p style="font-size:0.75rem; color:#b2bec3; margin:0; text-transform: uppercase; letter-spacing: 1px;">Password Saat Ini:</p>
            <div id="out-pass" style="font-size:2.5rem; font-weight:800; color:var(--p); margin-top: 10px;">********</div>
        </div>
        <button class="btn btn-p" onclick="copyText()">SALIN SANDI</button>
    </div>

    <div id="print-area">
        <div class="print-card">
            <h1>FREE WIFI</h1>
            <p>Scan QR untuk terhubung otomatis</p>
            <div id="qrcode-canvas"></div>
            <p style="margin:0; text-transform: uppercase; letter-spacing: 3px; color:#ccc !important;">Network Name:</p>
            <h2 id="print-ssid">WIFI NAME</h2>
            <div style="margin-top: 80px; border-top: 2px solid #eee; padding-top: 20px;">
                <p style="font-size: 1rem !important; color: #eee !important;">Powered by fizkers.github.io</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx6lvOcwYe_tw8FAJyXrbxbmVIkNDTpek",
        authDomain: "wifi-share-by-hafiz.firebaseapp.com",
        projectId: "wifi-share-by-hafiz",
        storageBucket: "wifi-share-by-hafiz.firebasestorage.app",
        messagingSenderId: "739918938868",
        appId: "1:739918938868:web:722a2a114a2135aa19d4a1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    function refreshQR(url) {
        const area = document.getElementById('qrcode-canvas');
        area.innerHTML = "";
        new QRCode(area, {
            text: url,
            width: 400,
            height: 400,
            colorDark: "#2d3436",
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user && !userId) {
            document.getElementById('auth-zone').classList.add('hidden');
            document.getElementById('dash-zone').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Halo, ${user.displayName.split(' ')[0]}! 👋`;
            
            const shareUrl = window.location.origin + window.location.pathname + "?id=" + user.uid;
            setTimeout(() => refreshQR(shareUrl), 800);

            getDoc(doc(db, "wifis", user.uid)).then(snap => {
                if(snap.exists()){
                    document.getElementById('dash-ssid').value = snap.data().ssid;
                    document.getElementById('dash-pass').value = snap.data().pass;
                    document.getElementById('print-ssid').innerText = snap.data().ssid;
                }
            });
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('saveBtn').onclick = async () => {
        const s = document.getElementById('dash-ssid').value, p = document.getElementById('dash-pass').value;
        if(!s || !p) return showToast("⚠️ Mohon isi data!");
        await setDoc(doc(db, "wifis", auth.currentUser.uid), { ssid: s, pass: p });
        document.getElementById('print-ssid').innerText = s;
        showToast("✅ Sistem WiFi Berhasil Diupdate!");
    };

    document.getElementById('printBtn').onclick = () => {
        showToast("🖨️ Menyiapkan desain kartu...");
        setTimeout(() => { window.print(); }, 1200);
    };

    if (userId) {
        document.getElementById('auth-zone').classList.add('hidden');
        document.getElementById('scan-zone').classList.remove('hidden');
        onSnapshot(doc(db, "wifis", userId), (docSnap) => {
            if (docSnap.exists()) {
                document.getElementById('out-ssid').innerText = docSnap.data().ssid;
                document.getElementById('out-pass').innerText = docSnap.data().pass;
            }
        });
    }

    window.copyText = () => {
        navigator.clipboard.writeText(document.getElementById('out-pass').innerText);
        showToast("📋 Sandi Berhasil Disalin!");
    }
</script>
</body>
</html>
