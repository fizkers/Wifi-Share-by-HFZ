<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Share Pro - Founder Muhammad Hafiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 420px; padding: 20px; position: relative; }
        .card { background: var(--card-bg); border-radius: 35px; padding: 40px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(255,255,255,0.8); }
        .founder { font-size: 0.65rem; font-weight: 800; color: #b2bec3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }
        h1 { font-size: 2rem; margin: 0; background: linear-gradient(45deg, var(--p), #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Form & Buttons */
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 18px; border: 1px solid #eee; background: #fdfdfd; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1); outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; font-family: inherit; font-size: 0.95rem; }
        .btn-p { background: var(--p); color: white; box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2); }
        .btn-p:hover { transform: translateY(-2px); }
        .btn-google { background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 12px; color: #444; }
        .btn-print { background: #00b894; color: white; margin-top: 30px; box-shadow: 0 8px 20px rgba(0, 184, 148, 0.2); }

        /* Toast Notification */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 15px 30px; border-radius: 50px; font-size: 0.9rem; z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #toast.show { bottom: 40px; }

        .hidden { display: none; }

        /* Print Design */
        #print-area { display: none; text-align: center; font-family: 'Poppins', sans-serif; padding: 20px; }
        .print-card { border: 4px solid #6c5ce7; border-radius: 40px; padding: 40px; display: inline-block; background: white; width: 350px; }
        
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: fixed; left: 0; top: 0; width: 100%; display: block !important; }
        }
    </style>
</head>
<body>

<div id="toast">
    <span id="toast-msg">Notifikasi</span>
</div>

<div class="container">
    <div id="auth-zone" class="card">
        <div class="founder">PLATFORM BY MUHAMMAD HAFIZ</div>
        <h1>WiFi Share 🔑</h1>
        <p style="color:#636e72; font-size: 0.85rem; margin-bottom: 40px;">Ganti sandi WiFi tanpa ganti stiker QR.</p>
        <button class="btn btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Masuk dengan Google
        </button>
    </div>

    <div id="dash-zone" class="card hidden">
        <div class="founder">CONTROL PANEL OWNER</div>
        <h3 id="user-greeting" style="margin-bottom: 30px;">Halo, Bos!</h3>
        <input type="text" id="dash-ssid" placeholder="Nama WiFi (SSID)">
        <input type="text" id="dash-pass" placeholder="Sandi WiFi Baru">
        <button class="btn btn-p" id="saveBtn">Simpan & Update QR</button>
        
        <button class="btn btn-print" id="printBtn">Cetak Kartu QR 🖨️</button>
        <p id="logoutBtn" style="color:#ff7675; cursor:pointer; font-size:0.8rem; margin-top:35px; font-weight: 600;">Log Out</p>
    </div>

    <div id="scan-zone" class="card hidden">
        <div class="founder">WIFI ACCESS PORTAL</div>
        <h1 id="out-ssid">...</h1>
        <div style="background:#f1f2f6; padding:35px 20px; border-radius:25px; margin:30px 0; border: 2px dashed #dfe6e9;">
            <p style="font-size:0.75rem; color:#b2bec3; margin:0; text-transform: uppercase;">Password:</p>
            <div id="out-pass" style="font-size:2.2rem; font-weight:800; color:var(--p); margin-top: 10px;">********</div>
        </div>
        <button class="btn btn-p" onclick="copyText()">SALIN SANDI</button>
    </div>

    <div id="print-area">
        <div class="print-card">
            <h1 style="-webkit-text-fill-color: #6c5ce7; font-size: 2.5rem; margin-bottom: 10px;">WIFI ACCESS</h1>
            <p style="color: #b2bec3; margin-bottom: 30px;">Scan to connect instantly</p>
            <div id="qrcode-canvas" style="display: flex; justify-content: center; margin-bottom: 30px;"></div>
            <h2 id="print-ssid" style="margin-bottom: 5px;">SSID</h2>
            <p style="font-size: 1.2rem; color: #444;">Sandi: <b id="print-pass">****</b></p>
            <p style="margin-top: 40px; font-size: 0.7rem; color: #dfe6e9;">Managed by fizkers.github.io</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx6lvOcwYe_tw8FAJyXrbxbmVIkNDTpek",
        authDomain: "wifi-share-by-hafiz.firebaseapp.com",
        projectId: "wifi-share-by-hafiz",
        storageBucket: "wifi-share-by-hafiz.firebasestorage.app",
        messagingSenderId: "739918938868",
        appId: "1:739918938868:web:722a2a114a2135aa19d4a1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    // Toast Function
    window.showToast = (msg) => {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    // QR Logic
    function refreshQR(url) {
        document.getElementById('qrcode-canvas').innerHTML = "";
        new QRCode(document.getElementById("qrcode-canvas"), {
            text: url,
            width: 220,
            height: 220,
            colorDark: "#2d3436",
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user && !userId) {
            document.getElementById('auth-zone').classList.add('hidden');
            document.getElementById('dash-zone').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Halo, ${user.displayName.split(' ')[0]}! 👋`;
            
            const shareUrl = window.location.origin + window.location.pathname + "?id=" + user.uid;
            setTimeout(() => refreshQR(shareUrl), 500);

            getDoc(doc(db, "wifis", user.uid)).then(snap => {
                if(snap.exists()){
                    document.getElementById('dash-ssid').value = snap.data().ssid;
                    document.getElementById('dash-pass').value = snap.data().pass;
                    document.getElementById('print-ssid').innerText = snap.data().ssid;
                    document.getElementById('print-pass').innerText = snap.data().pass;
                }
            });
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('saveBtn').onclick = async () => {
        const s = document.getElementById('dash-ssid').value, p = document.getElementById('dash-pass').value;
        if(!s || !p) return showToast("⚠️ Isi data dengan lengkap!");
        
        await setDoc(doc(db, "wifis", auth.currentUser.uid), { ssid: s, pass: p });
        document.getElementById('print-ssid').innerText = s;
        document.getElementById('print-pass').innerText = p;
        showToast("✅ Data Berhasil Disimpan!");
    };

    document.getElementById('printBtn').onclick = () => {
        showToast("🖨️ Menyiapkan dokumen...");
        setTimeout(() => { window.print(); }, 1000);
    };

    if (userId) {
        document.getElementById('auth-zone').classList.add('hidden');
        document.getElementById('scan-zone').classList.remove('hidden');
        onSnapshot(doc(db, "wifis", userId), (docSnap) => {
            if (docSnap.exists()) {
                document.getElementById('out-ssid').innerText = docSnap.data().ssid;
                document.getElementById('out-pass').innerText = docSnap.data().pass;
            }
        });
    }

    window.copyText = () => {
        navigator.clipboard.writeText(document.getElementById('out-pass').innerText);
        showToast("📋 Sandi Berhasil Disalin!");
    }
</script>
</body>
</html>
