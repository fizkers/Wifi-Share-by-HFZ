<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Share Pro - Founder Muhammad Hafiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: white; border-radius: 30px; padding: 40px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; }
        .founder { font-size: 0.6rem; font-weight: 800; color: #b2bec3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin: 0; color: var(--p); }
        
        /* Input & Button */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-google { background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Dashboard QR Preview */
        #qr-preview { background: #f9f9f9; padding: 20px; border-radius: 20px; margin: 20px 0; display: flex; justify-content: center; }
        .hidden { display: none; }

        /* GAYA KHUSUS UNTUK CETAK (PRINT) */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; padding: 40px; border: 2px solid #000; border-radius: 0; }
        }

        #print-area { display: none; background: white; border: 2px solid var(--p); border-radius: 20px; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-zone" class="card">
        <div class="founder">BY MUHAMMAD HAFIZ</div>
        <h1>WiFi Share 🔑</h1>
        <p style="color:#777; font-size: 0.8rem; margin-bottom: 25px;">Satu QR untuk selamanya.</p>
        <button class="btn btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Masuk dengan Google
        </button>
    </div>

    <div id="dash-zone" class="card hidden">
        <div class="founder">OWNER PANEL</div>
        <h3 id="user-greeting">Halo!</h3>
        <input type="text" id="dash-ssid" placeholder="Nama WiFi (SSID)">
        <input type="text" id="dash-pass" placeholder="Sandi WiFi Baru">
        <button class="btn btn-p" id="saveBtn">Simpan & Update QR</button>
        
        <div id="print-area">
            <h2 style="margin:0; color:#6c5ce7;">WIFI ACCESS</h2>
            <p style="margin:5px 0 15px 0; font-size:0.8rem; color:#888;">Scan to Connect</p>
            <div id="qrcode-final" style="display:flex; justify-content:center;"></div>
            <h3 style="margin:15px 0 5px 0;" id="print-ssid">SSID</h3>
            <p style="margin:0; font-weight:bold;">Sandi: <span id="print-pass">****</span></p>
            <p style="font-size:0.6rem; margin-top:20px; color:#aaa;">Platform by fizkers.github.io</p>
        </div>

        <button class="btn" id="printBtn" style="background:#2ecc71; color:white;">Cetak Kartu QR 🖨️</button>
        <p id="logoutBtn" style="color:#ff7675; cursor:pointer; font-size:0.8rem; margin-top:20px;">Keluar</p>
    </div>

    <div id="scan-zone" class="card hidden">
        <div class="founder">WIFI PORTAL</div>
        <h1 id="out-ssid">...</h1>
        <div style="background:#f4f4f4; padding:20px; border-radius:15px; margin:20px 0;">
            <p style="font-size:0.7rem; color:#aaa; margin:0;">PASSWORD:</p>
            <div id="out-pass" style="font-size:1.5rem; font-weight:800; color:var(--p);">********</div>
        </div>
        <button class="btn btn-p" onclick="copyText()">SALIN SANDI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx6lvOcwYe_tw8FAJyXrbxbmVIkNDTpek",
        authDomain: "wifi-share-by-hafiz.firebaseapp.com",
        projectId: "wifi-share-by-hafiz",
        storageBucket: "wifi-share-by-hafiz.firebasestorage.app",
        messagingSenderId: "739918938868",
        appId: "1:739918938868:web:722a2a114a2135aa19d4a1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    // QR Code Generator Function
    function generateQR(url) {
        document.getElementById('qrcode-final').innerHTML = "";
        new QRCode(document.getElementById("qrcode-final"), {
            text: url,
            width: 180,
            height: 180
        });
    }

    // Auth & Logic
    onAuthStateChanged(auth, (user) => {
        if (user && !userId) {
            document.getElementById('auth-zone').classList.add('hidden');
            document.getElementById('dash-zone').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Halo, ${user.displayName.split(' ')[0]}!`;
            
            const shareUrl = window.location.origin + window.location.pathname + "?id=" + user.uid;
            generateQR(shareUrl);

            getDoc(doc(db, "wifis", user.uid)).then(snap => {
                if(snap.exists()){
                    document.getElementById('dash-ssid').value = snap.data().ssid;
                    document.getElementById('dash-pass').value = snap.data().pass;
                    document.getElementById('print-ssid').innerText = snap.data().ssid;
                    document.getElementById('print-pass').innerText = snap.data().pass;
                }
            });
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('saveBtn').onclick = async () => {
        const s = document.getElementById('dash-ssid').value, p = document.getElementById('dash-pass').value;
        await setDoc(doc(db, "wifis", auth.currentUser.uid), { ssid: s, pass: p });
        document.getElementById('print-ssid').innerText = s;
        document.getElementById('print-pass').innerText = p;
        alert("Data Tersimpan!");
    };

    // Fitur Cetak
    document.getElementById('printBtn').onclick = () => {
        document.getElementById('print-area').style.display = 'block';
        window.print();
        document.getElementById('print-area').style.display = 'none';
    };

    // Visitor Logic
    if (userId) {
        document.getElementById('auth-zone').classList.add('hidden');
        document.getElementById('scan-zone').classList.remove('hidden');
        onSnapshot(doc(db, "wifis", userId), (docSnap) => {
            if (docSnap.exists()) {
                document.getElementById('out-ssid').innerText = docSnap.data().ssid;
                document.getElementById('out-pass').innerText = docSnap.data().pass;
            }
        });
    }

    window.copyText = () => {
        navigator.clipboard.writeText(document.getElementById('out-pass').innerText);
        alert("Sandi disalin!");
    }
</script>
</body>
</html>
